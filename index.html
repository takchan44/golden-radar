<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Radar — 골든크로스 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#080c14;--bg2:#0d1520;--bg3:#111c2d;--card:#0f1923;--border:#1a2d44;
    --gold:#f0b429;--gold2:#ffd166;--green:#06d6a0;--red:#ef476f;--blue:#118ab2;
    --text:#e8edf5;--muted:#5a7494;--accent:#1e3a5f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(240,180,41,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,180,41,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 24px;}

  header{border-bottom:1px solid var(--border);padding:20px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gold);}
  .logo span{color:var(--text);}
  .header-meta{display:flex;align-items:center;gap:20px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .live-badge{display:flex;align-items:center;gap:6px;background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.3);border-radius:20px;padding:4px 12px;color:var(--green);font-size:11px;letter-spacing:1px;}
  .live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.4);}}

  .upload-panel{margin:28px 0;background:var(--card);border:2px dashed var(--border);border-radius:16px;padding:32px;text-align:center;transition:border-color 0.2s,background 0.2s;cursor:pointer;position:relative;overflow:hidden;}
  .upload-panel:hover,.upload-panel.drag{border-color:var(--gold);background:rgba(240,180,41,0.04);}
  .upload-panel input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .upload-icon{font-size:40px;margin-bottom:12px;}
  .upload-panel h3{font-size:16px;font-weight:500;margin-bottom:6px;}
  .upload-panel p{font-size:13px;color:var(--muted);}
  .loaded-files{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px;}
  .file-chip{display:flex;align-items:center;gap:6px;background:rgba(240,180,41,0.12);border:1px solid rgba(240,180,41,0.3);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--gold);font-family:'JetBrains Mono',monospace;}

  .tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:12px 20px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s;letter-spacing:0.5px;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500;}

  .summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
  .sum-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color 0.2s,transform 0.15s;}
  .sum-card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .sum-card .label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .sum-card .value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);letter-spacing:1px;}
  .sum-card .sub{font-size:12px;color:var(--muted);margin-top:4px;}

  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .search-box{flex:1;min-width:200px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;}
  .search-box:focus{border-color:var(--gold);}
  .search-box::placeholder{color:var(--muted);}
  .sort-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;white-space:nowrap;}
  .sort-btn:hover,.sort-btn.active{background:var(--accent);border-color:var(--gold);color:var(--gold);}

  .stock-grid{display:flex;flex-direction:column;gap:6px;}
  .stock-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:grid;align-items:center;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
  .stock-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:0;transition:opacity 0.2s;}
  .stock-row:hover{border-color:var(--gold);background:rgba(240,180,41,0.04);transform:translateX(2px);}
  .stock-row:hover::before{opacity:1;}
  .stock-row.nasdaq-row{grid-template-columns:80px 1fr 120px 90px 120px;gap:12px;}
  .stock-row.kospi-row{grid-template-columns:1fr 100px 100px 110px 90px 80px;gap:12px;}
  .ticker-badge{background:var(--accent);border:1px solid rgba(240,180,41,0.3);border-radius:6px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--gold);text-align:center;}
  .stock-name{font-size:14px;font-weight:500;}
  .stock-name .sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:300;}
  .price{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;text-align:right;}
  .change-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;}
  .change-badge.up{background:rgba(6,214,160,0.12);color:var(--green);}
  .change-badge.high{background:rgba(240,180,41,0.15);color:var(--gold);}
  .range-bar-wrap{display:flex;flex-direction:column;gap:3px;}
  .range-label{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;}
  .range-bar{height:4px;background:var(--border);border-radius:2px;}
  .range-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--gold));}
  .table-header{padding:8px 18px;display:grid;align-items:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .table-header.nasdaq-row{grid-template-columns:80px 1fr 120px 90px 120px;gap:12px;}
  .table-header.kospi-row{grid-template-columns:1fr 100px 100px 110px 90px 80px;gap:12px;}
  .news-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;}
  .news-chip.yes{background:rgba(6,214,160,0.12);color:var(--green);}
  .news-chip.no{background:var(--bg3);color:var(--muted);}
  /* TOP3 추천 */
  .top3-section{margin-bottom:28px;}
  .top3-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .top3-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);}
  .top3-subtitle{font-size:12px;color:var(--muted);margin-top:2px;}
  .top3-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
  .top3-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .top3-card:hover{border-color:var(--gold);transform:translateY(-3px);}
  .top3-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .top3-card.rank-1::before{background:linear-gradient(90deg,#FFD700,#FFA500);}
  .top3-card.rank-2::before{background:linear-gradient(90deg,#C0C0C0,#A0A0A0);}
  .top3-card.rank-3::before{background:linear-gradient(90deg,#CD7F32,#A0522D);}
  .top3-rank{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;margin-bottom:8px;}
  .top3-rank.rank-1{color:#FFD700;}
  .top3-rank.rank-2{color:#C0C0C0;}
  .top3-rank.rank-3{color:#CD7F32;}
  .top3-ticker{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:2px;}
  .top3-name{font-size:12px;color:var(--muted);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .top3-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .top3-stat{background:var(--bg3);border-radius:8px;padding:8px 10px;}
  .top3-stat .tsl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
  .top3-stat .tsv{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;}
  .top3-reason{font-size:12px;color:var(--text);line-height:1.7;border-top:1px solid var(--border);padding-top:10px;}
  .top3-loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
  .top3-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  .top3-score{display:inline-flex;align-items:center;gap:4px;background:rgba(240,180,41,0.15);border:1px solid rgba(240,180,41,0.3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
  .heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
  .heatmap-cell{border-radius:10px;padding:14px 12px;cursor:pointer;transition:all 0.18s;border:1px solid transparent;text-align:center;}
  .heatmap-cell:hover{transform:scale(1.04);border-color:rgba(255,255,255,0.2);}
  .heatmap-cell .hticker{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;margin-bottom:4px;}
  .heatmap-cell .hchange{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;}
  .heatmap-cell .hprice{font-size:11px;margin-top:3px;opacity:0.75;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:14px;}
  .fade-in{animation:fadeIn 0.3s ease-out;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* ── 모달 ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:900px;animation:slideUp 0.25s ease-out;}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-header{padding:24px 28px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
  .modal-header-left{display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;}
  .modal-ticker{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--gold);letter-spacing:2px;line-height:1;}
  .modal-name{font-size:14px;color:var(--muted);margin-bottom:4px;}
  .modal-close{background:var(--card);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
  .modal-close:hover{border-color:var(--red);color:var(--red);}

  /* 투자 점수 뱃지 */
  .score-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;border:3px solid var(--gold);font-family:'Bebas Neue',sans-serif;}
  .score-badge .snum{font-size:28px;color:var(--gold);line-height:1;}
  .score-badge .smax{font-size:11px;color:var(--muted);}
  .opinion-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;letter-spacing:1px;}
  .opinion-pill.buy{background:rgba(6,214,160,0.15);border:1px solid rgba(6,214,160,0.4);color:var(--green);}
  .opinion-pill.hold{background:rgba(240,180,41,0.15);border:1px solid rgba(240,180,41,0.4);color:var(--gold);}
  .opinion-pill.sell{background:rgba(239,71,111,0.15);border:1px solid rgba(239,71,111,0.4);color:var(--red);}

  .modal-body{padding:24px 28px;}
  .modal-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .modal-tab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 16px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .modal-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .modal-panel{display:none;}
  .modal-panel.active{display:block;}

  /* 통계 카드 */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .stat-card .slabel{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .stat-card .sval{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;}
  .stat-card .sval.gold{color:var(--gold);}
  .stat-card .sval.green{color:var(--green);}
  .stat-card .sval.red{color:var(--red);}
  .stat-card .sval.muted{color:var(--muted);}

  /* 기술적 지표 */
  .indicator-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px;}
  .indicator-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .indicator-card .iname{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .indicator-card .ival{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;margin-bottom:6px;}
  .indicator-card .ibar{height:6px;background:var(--border);border-radius:3px;margin-bottom:6px;}
  .indicator-card .ibar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
  .indicator-card .istat{font-size:11px;}
  .indicator-card .ilabel{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}

  /* 차트 */
  .chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;}
  .chart-title{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}

  /* 유사종목 */
  .peers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px;}
  .peer-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.18s;}
  .peer-card:hover{border-color:var(--gold);}
  .peer-card .pticker{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--gold);margin-bottom:4px;}
  .peer-card .pname{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .peer-card .pchange{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;}

  /* 뉴스 */
  .news-list{display:flex;flex-direction:column;gap:10px;}
  .news-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color 0.2s;}
  .news-item:hover{border-color:var(--gold);}
  .news-item .ntitle{font-size:13px;font-weight:500;margin-bottom:6px;line-height:1.5;}
  .news-item .nmeta{font-size:11px;color:var(--muted);display:flex;gap:12px;}
  .news-sentiment{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;letter-spacing:1px;}
  .news-sentiment.pos{background:rgba(6,214,160,0.12);color:var(--green);}
  .news-sentiment.neg{background:rgba(239,71,111,0.12);color:var(--red);}
  .news-sentiment.neu{background:var(--bg3);color:var(--muted);}

  /* AI 리포트 */
  .ai-section{background:var(--bg3);border:1px solid rgba(240,180,41,0.2);border-radius:12px;padding:20px;}
  .ai-header{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;font-weight:500;color:var(--gold);}
  .ai-content{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;}
  .ai-loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;}
  .ai-spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 재무 바 */
  .fin-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .fin-label{font-size:12px;color:var(--muted);width:100px;flex-shrink:0;}
  .fin-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;}
  .fin-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--green));}
  .fin-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);width:80px;text-align:right;flex-shrink:0;}

  @media(max-width:768px){
    .stock-row.nasdaq-row{grid-template-columns:70px 1fr 80px 70px;}
    .stock-row.nasdaq-row .range-bar-wrap{display:none;}
    .stock-row.kospi-row{grid-template-columns:1fr 80px 80px 70px;}
    .stock-row.kospi-row .range-bar-wrap,.stock-row.kospi-row .news-col{display:none;}
    .table-header.nasdaq-row{grid-template-columns:70px 1fr 80px 70px;}
    .table-header.kospi-row{grid-template-columns:1fr 80px 80px 70px;}
    .modal-header{padding:16px;}
    .modal-body{padding:16px;}
    .modal-ticker{font-size:36px;}
    .indicator-row{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">GOLDEN<span>RADAR</span></div>
    <div class="header-meta">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <span id="clock"></span>
    </div>
  </header>

  <input type="file" id="fileInput" multiple accept=".xlsx,.xls" style="display:none" onchange="handleFiles(this.files)">
  <div class="upload-panel" id="uploadPanel" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📂</div>
    <h3 id="uploadTitle">엑셀 파일을 드래그하거나 클릭해서 업로드</h3>
    <p>나스닥 / 코스피 골든크로스 임박 종목 파일 (.xlsx)</p>
    <div class="loaded-files" id="loadedFiles"></div>
  </div>

  <!-- TOP3 추천 섹션 -->
  <div class="top3-section" id="top3Section" style="display:none">
    <div class="top3-header">
      <div>
        <div class="top3-title">✦ AI 추천 TOP 3</div>
        <div class="top3-subtitle">업로드된 종목 전체를 분석한 최우선 투자 후보</div>
      </div>
      <button onclick="runTop3Analysis()" style="background:var(--accent);border:1px solid var(--gold);border-radius:8px;padding:8px 16px;font-size:12px;color:var(--gold);cursor:pointer;font-family:'Noto Sans KR',sans-serif;">↻ 재분석</button>
    </div>
    <div id="top3Content"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('nasdaq')">📈 나스닥</button>
    <button class="tab-btn" onclick="switchTab('kospi')">🇰🇷 코스피</button>
    <button class="tab-btn" onclick="switchTab('heatmap')">🔥 히트맵</button>
  </div>

  <div id="tab-nasdaq">
    <div class="summary-row" id="nasdaqSummary"></div>
    <div class="toolbar">
      <input class="search-box" type="text" placeholder="티커 또는 기업명 검색..." id="nasdaqSearch" oninput="renderNasdaq()">

function switchTab(name){
  ['nasdaq','kospi','heatmap'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',['nasdaq','kospi','heatmap'][i]===name);});
  if(name==='heatmap') renderHeatmap();
}

function renderSummary(data,type){
  const el=document.getElementById(type+'Summary');
  const avg=(data.reduce((s,d)=>s+d['등락률(%)'],0)/data.length).toFixed(2);
  const top=data.slice().sort((a,b)=>b['등락률(%)']-a['등락률(%)'])[0];
  const topName=type==='nasdaq'?top['티커']:top['종목명'].slice(0,5);
  el.innerHTML=`
    <div class="sum-card"><div class="label">총 종목 수</div><div class="value">${data.length}</div><div class="sub">골든크로스 임박</div></div>
    <div class="sum-card"><div class="label">평균 등락률</div><div class="value">+${avg}%</div><div class="sub">전체 평균</div></div>
    <div class="sum-card"><div class="label">상위 종목</div><div class="value">${topName}</div><div class="sub">+${top['등락률(%)']}%</div></div>
    <div class="sum-card"><div class="label">5%+ 강한 신호</div><div class="value">${data.filter(d=>d['등락률(%)']>=5).length}</div><div class="sub">종목</div></div>`;
}
function heatColor(r){
  const t=Math.min(r/15,1);
  if(t<0.3) return{bg:`rgba(6,214,160,${0.1+t*0.5})`,text:'#06d6a0'};
  if(t<0.6) return{bg:`rgba(240,180,41,${0.12+t*0.4})`,text:'#f0b429'};
  return{bg:`rgba(239,71,111,${0.15+t*0.35})`,text:'#ef476f'};
}

    const pct=Math.min(((d['현재가($)']-low)/(high-low))*100,100);
    return`<div class="stock-row nasdaq-row fade-in" onclick='openModal("nasdaq",${JSON.stringify(d)})'>
      <div class="ticker-badge">${d['티커']}</div>
      <div class="stock-name">${d['기업명']}</div>
      <div class="price" style="color:var(--green)">$${d['현재가($)'].toFixed(2)}</div>
      <div style="text-align:center"><span class="change-badge ${r>=5?'high':'up'}">+${r}%</span></div>
      <div class="range-bar-wrap"><div class="range-label"><span>$${low}</span><span>$${high}</span></div><div class="range-bar"><div class="range-fill" style="width:${pct}%"></div></div></div>
    </div>`;}).join('');
}
function setSortKospi(s){kospiSort=s;['rate','price','upside'].forEach(k=>document.getElementById('sortk-'+k).classList.toggle('active',k===s));renderKospi();}
function renderKospi(){
  renderSummary(kospiData,'kospi');
  const q=document.getElementById('kospiSearch').value.toLowerCase();
  let data=kospiData.filter(d=>d['종목명'].toLowerCase().includes(q));
  if(kospiSort==='rate') data.sort((a,b)=>b['등락률(%)']-a['등락률(%)']);
  else if(kospiSort==='price') data.sort((a,b)=>b['현재가']-a['현재가']);
  else data.sort((a,b)=>{const ua=((a['상한가(예상)']-a['현재가'])/a['현재가'])*100,ub=((b['상한가(예상)']-b['현재가'])/b['현재가'])*100;return ub-ua;});
  document.getElementById('kospiGrid').innerHTML=data.map(d=>{
    const r=d['등락률(%)'],upside=(((d['상한가(예상)']-d['현재가'])/d['현재가'])*100).toFixed(1);
    const hasNews=d['호재 뉴스']&&d['호재 뉴스']!=='없음';
    return`<div class="stock-row kospi-row fade-in" onclick='openModal("kospi",${JSON.stringify(d)})'>
      <div class="stock-name">${d['종목명']}<div class="sub">상승여력 +${upside}%</div></div>
      <div class="price" style="color:var(--green)">${d['현재가'].toLocaleString()}원</div>
      <div class="price" style="color:var(--muted);font-size:13px">${d['하단선'].toLocaleString()}원</div>
      <div class="price" style="color:var(--gold2)">${d['상한가(예상)'].toLocaleString()}원</div>
      <div style="text-align:center"><span class="change-badge ${r>=10?'high':'up'}">+${r}%</span></div>
      <div class="news-col" style="text-align:center"><span class="news-chip ${hasNews?'yes':'no'}">${hasNews?'✓ 있음':'없음'}</span></div>
    </div>`;}).join('');
}

function switchModalTab(name){
  document.querySelectorAll('.modal-tab').forEach((b,i)=>b.classList.toggle('active',['overview','technical','financial','peers','news','ai'][i]===name));
  document.querySelectorAll('.modal-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

function seeded(seed,min,max){
  const x=Math.sin(seed)*10000;
  return min+(x-Math.floor(x))*(max-min);
}

function openModal(type,stock){
  const isN=type==='nasdaq';
  const name=isN?stock['기업명']:'코스피 상장종목';
  const ticker=isN?stock['티커']:stock['종목명'];
  const price=isN?stock['현재가($)']:stock['현재가'];
  const r=stock['등락률(%)'];

  document.getElementById('mTicker').textContent=ticker;
  document.getElementById('mName').textContent=name;

  // 투자 점수 계산 (등락률 기반 모의)
  const score=Math.min(10,Math.max(1,Math.round(3+r*0.4+(r>=5?1.5:0)+(r>=10?1:0))));
  const opinion=score>=7?'매수':score>=5?'관망':'매도';
  const opCls=score>=7?'buy':score>=5?'hold':'sell';
  const opEmoji=score>=7?'▲ 매수':score>=5?'— 관망':'▼ 매도';
  document.getElementById('mScoreBadge').innerHTML=`<div class="score-badge"><div class="snum">${score}</div><div class="smax">/10</div></div>`;
  document.getElementById('mOpinion').innerHTML=`<div class="opinion-pill ${opCls}">${opEmoji}</div>`;

  // 개요 탭 통계
  const w52h=(price*seeded(price,1.15,1.45)).toFixed(isN?2:0);
  const w52l=(price*seeded(price+1,0.55,0.82)).toFixed(isN?2:0);
  const vol=Math.round(seeded(price+2,500000,8000000));
  const mktcap=isN?`$${(price*seeded(price+3,50,5000)).toFixed(0)}M`:`${(price*seeded(price+3,1,500)*10000/1e8).toFixed(1)}조`;
  const upside=isN?`+${(price*0.25).toFixed(2)}`:`+${(((stock['상한가(예상)']-price)/price)*100).toFixed(1)}%`;

  document.getElementById('mStats').innerHTML=`
    <div class="stat-card"><div class="slabel">현재가</div><div class="sval green">${isN?'$'+price.toFixed(2):price.toLocaleString()+'원'}</div></div>
    <div class="stat-card"><div class="slabel">등락률</div><div class="sval gold">+${r}%</div></div>
    <div class="stat-card"><div class="slabel">상승여력</div><div class="sval gold">${upside}</div></div>
    <div class="stat-card"><div class="slabel">52주 최고</div><div class="sval">${isN?'$'+w52h:Number(w52h).toLocaleString()+'원'}</div></div>
    <div class="stat-card"><div class="slabel">52주 최저</div><div class="sval red">${isN?'$'+w52l:Number(w52l).toLocaleString()+'원'}</div></div>
    <div class="stat-card"><div class="slabel">거래량</div><div class="sval muted">${(vol/10000).toFixed(0)}만</div></div>
    <div class="stat-card"><div class="slabel">시가총액</div><div class="sval">${mktcap}</div></div>
    <div class="stat-card"><div class="slabel">신호 강도</div><div class="sval" style="color:${r>=5?'var(--red)':'var(--green)'}">${r>=10?'🔥 강함':r>=5?'⚡ 보통':'✓ 약함'}</div></div>`;

  // 차트 데이터 생성
  const labels=['5일전','4일전','3일전','2일전','1일전','오늘'];
  const prices=labels.map((_,i)=>+(price*(0.88+0.04*i+Math.sin(i*2+price)*0.02)).toFixed(isN?2:0));
  prices[5]=price;
  const ma5=prices.map((_,i)=>{const s=prices.slice(Math.max(0,i-4),i+1);return+(s.reduce((a,b)=>a+b,0)/s.length).toFixed(isN?2:0);});
  const vols=labels.map((_,i)=>Math.round(vol*(0.7+Math.sin(i+price)*0.3)));

  destroyCharts();

  // 가격 차트
  const pc=document.getElementById('priceChart').getContext('2d');
  charts.price=new Chart(pc,{data:{labels,datasets:[
    {type:'line',label:'가격',data:prices,borderColor:'#06d6a0',backgroundColor:'rgba(6,214,160,0.05)',tension:0.4,pointBackgroundColor:'#06d6a0',pointRadius:4,fill:true},
    {type:'line',label:'MA5',data:ma5,borderColor:'#f0b429',borderDash:[4,4],pointRadius:0,tension:0.3}
  ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#5a7494',font:{size:11}}}},scales:{x:{ticks:{color:'#5a7494'},grid:{color:'#1a2d44'}},y:{ticks:{color:'#5a7494'},grid:{color:'#1a2d44'}}}}});

  // 거래량 차트
  const vc=document.getElementById('volumeChart').getContext('2d');
  charts.vol=new Chart(vc,{type:'bar',data:{labels,datasets:[{label:'거래량',data:vols,backgroundColor:'rgba(17,138,178,0.5)',borderColor:'#118ab2',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a7494'},grid:{color:'#1a2d44'}},y:{ticks:{color:'#5a7494',callback:v=>(v/10000).toFixed(0)+'만'},grid:{color:'#1a2d44'}}}}});

  // 기술적 지표 계산
  const rsi=Math.min(85,Math.max(30,50+r*2.5+seeded(price,0,10)-5));
  const macdVal=(r*0.3+seeded(price+5,-1,1)).toFixed(2);
  const signal=(r*0.2+seeded(price+6,-0.5,0.5)).toFixed(2);
  const bbMid=price,bbStd=price*0.04;
  const bbUpper=(bbMid+2*bbStd).toFixed(isN?2:0);
  const bbLower=(bbMid-2*bbStd).toFixed(isN?2:0);
  const bbPct=Math.min(95,Math.max(5,50+r*3));
  const rsiColor=rsi>70?'var(--red)':rsi<30?'var(--green)':'var(--gold)';
  const rsiLabel=rsi>70?'과매수':rsi<30?'과매도':'중립';

  document.getElementById('mIndicators').innerHTML=`
    <div class="indicator-card">
      <div class="iname">RSI (14)</div>
      <div class="ival" style="color:${rsiColor}">${rsi.toFixed(1)}</div>
      <div class="ibar"><div class="ibar-fill" style="width:${rsi}%;background:${rsiColor}"></div></div>
      <div class="ilabel"><span>0</span><span>30</span><span>70</span><span>100</span></div>
      <div class="istat" style="color:${rsiColor}">${rsiLabel}</div>
    </div>
    <div class="indicator-card">
      <div class="iname">MACD</div>
      <div class="ival" style="color:${macdVal>0?'var(--green)':'var(--red)'}">+${macdVal}</div>
      <div class="istat" style="color:var(--muted)">Signal: ${signal}</div>
      <div class="istat" style="color:${macdVal>signal?'var(--green)':'var(--red)'};margin-top:4px">${macdVal>signal?'▲ 골든크로스':'▼ 데드크로스'}</div>
    </div>
    <div class="indicator-card">
      <div class="iname">볼린저밴드</div>
      <div class="ival" style="color:var(--blue)">${bbPct.toFixed(0)}%</div>
      <div class="ibar"><div class="ibar-fill" style="width:${bbPct}%;background:var(--blue)"></div></div>
      <div class="istat" style="color:var(--muted)">상단: ${isN?'$'+bbUpper:Number(bbUpper).toLocaleString()+'원'}</div>
      <div class="istat" style="color:var(--muted)">하단: ${isN?'$'+bbLower:Number(bbLower).toLocaleString()+'원'}</div>
    </div>
    <div class="indicator-card">
      <div class="iname">이동평균</div>
      <div class="ival" style="color:var(--green)">MA5 ↑</div>
      <div class="istat" style="color:var(--muted)">MA5: ${isN?'$'+ma5[4].toFixed(2):ma5[4].toLocaleString()+'원'}</div>
      <div class="istat" style="color:var(--gold)">골든크로스 임박</div>
    </div>`;

  // 볼린저 밴드 차트
  setTimeout(()=>{
    const bc=document.getElementById('bbChart').getContext('2d');
    const bbU=prices.map(p=>+(p+p*0.04).toFixed(isN?2:0));
    const bbL=prices.map(p=>+(p-p*0.04).toFixed(isN?2:0));
    charts.bb=new Chart(bc,{data:{labels,datasets:[
      {type:'line',label:'상단',data:bbU,borderColor:'rgba(17,138,178,0.5)',borderDash:[3,3],pointRadius:0,fill:false},
      {type:'line',label:'가격',data:prices,borderColor:'#06d6a0',backgroundColor:'rgba(6,214,160,0.05)',tension:0.4,pointRadius:3,fill:false},
      {type:'line',label:'하단',data:bbL,borderColor:'rgba(17,138,178,0.5)',borderDash:[3,3],pointRadius:0,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#5a7494',font:{size:11}}}},scales:{x:{ticks:{color:'#5a7494'},grid:{color:'#1a2d44'}},y:{ticks:{color:'#5a7494'},grid:{color:'#1a2d44'}}}}});

    // MACD 차트
    const mc=document.getElementById('macdChart').getContext('2d');
    const macdLine=labels.map((_,i)=>(+(r*0.2+Math.sin(i+price)*0.5)).toFixed(2));
    const sigLine=labels.map((_,i)=>(+(r*0.15+Math.sin(i+price+0.5)*0.3)).toFixed(2));
    const hist=macdLine.map((v,i)=>+(v-sigLine[i]).toFixed(2));
    charts.macd=new Chart(mc,{data:{labels,datasets:[
      {type:'bar',label:'히스토그램',data:hist,backgroundColor:hist.map(v=>v>=0?'rgba(6,214,160,0.5)':'rgba(239,71,111,0.5)')},
      {type:'line',label:'MACD',data:macdLine,borderColor:'#f0b429',pointRadius:0,tension:0.3},
      {type:'line',label:'Signal',data:sigLine,borderColor:'#118ab2',pointRadius:0,tension:0.3,borderDash:[3,3]}
    ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#5a7494',font:{size:11}}}},scales:{x:{ticks:{color:'#5a7494'},grid:{color:'#1a2d44'}},y:{ticks:{color:'#5a7494'},grid:{color:'#1a2d44'}}}}});
  },100);

  // 재무제표 (모의)
  const rev=(seeded(price+10,1,500)).toFixed(1);
  const op=(rev*seeded(price+11,0.05,0.25)).toFixed(1);
  const net=(op*seeded(price+12,0.5,0.9)).toFixed(1);
  const per=(seeded(price+13,8,45)).toFixed(1);
  const pbr=(seeded(price+14,0.5,5)).toFixed(1);
  const roe=(seeded(price+15,5,30)).toFixed(1);
  document.getElementById('mFinStats').innerHTML=`
    <div class="stat-card"><div class="slabel">PER</div><div class="sval gold">${per}x</div></div>
    <div class="stat-card"><div class="slabel">PBR</div><div class="sval">${pbr}x</div></div>
    <div class="stat-card"><div class="slabel">ROE</div><div class="sval green">${roe}%</div></div>
    <div class="stat-card"><div class="slabel">영업이익률</div><div class="sval">${(op/rev*100).toFixed(1)}%</div></div>`;
  const maxRev=Math.max(rev,op,net)*1.2;
  document.getElementById('mFinBars').innerHTML=`
    <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">연간 실적 (억원 / 백만달러)</div>
    ${[['매출',rev,'var(--blue)'],['영업이익',op,'var(--green)'],['순이익',net,'var(--gold)']].map(([l,v,c])=>`
    <div class="fin-row">
      <div class="fin-label">${l}</div>
      <div class="fin-bar-wrap"><div class="fin-bar-fill" style="width:${(v/maxRev*100).toFixed(0)}%;background:${c}"></div></div>
      <div class="fin-val">${isN?'$'+v+'B':v+'억'}</div>
    </div>`).join('')}`;

  // 유사 종목
  const pool=isN?nasdaqData:kospiData;
  const peers=pool.filter(d=>(isN?d['티커']:d['종목명'])!==ticker).sort(()=>Math.random()-0.5).slice(0,6);
  document.getElementById('mPeers').innerHTML=peers.map(d=>{
    const pt=isN?d['티커']:d['종목명'];
    const pp=isN?'$'+d['현재가($)'].toFixed(2):d['현재가'].toLocaleString()+'원';
    const pr=d['등락률(%)'];
    return`<div class="peer-card" onclick='openModal("${type}",${JSON.stringify(d)})'>

      <div class="pname">${isN?d['기업명'].slice(0,18):''}</div>
      <div class="pchange" style="color:var(--green)">${pp}</div>
      <div style="margin-top:4px"><span class="change-badge ${pr>=5?'high':'up'}" style="font-size:11px">+${pr}%</span></div>
    </div>`;}).join('');

  // 뉴스 (모의)
  const newsTemplates=isN?[
    {t:`${ticker} 골든크로스 기술적 돌파 신호 포착`,s:'pos',src:'Bloomberg',time:'2시간 전'},
    {t:`월가 애널리스트, ${ticker} 목표주가 상향 조정`,s:'pos',src:'Reuters',time:'4시간 전'},
    {t:`${name} 신제품 발표 예정, 시장 기대감 상승`,s:'pos',src:'MarketWatch',time:'6시간 전'},
    {t:`나스닥 전반적 강세... ${ticker} 수혜 예상`,s:'neu',src:'CNBC',time:'8시간 전'},
    {t:`${ticker} 단기 과매수 구간 진입 주의`,s:'neg',src:'Seeking Alpha',time:'12시간 전'},
  ]:[
    {t:`${ticker} 골든크로스 임박, 기술적 매수 시점 포착`,s:'pos',src:'한국경제',time:'1시간 전'},
    {t:`외국인·기관 동반 매수세 유입`,s:'pos',src:'매일경제',time:'3시간 전'},
    {t:`코스피 강세장 수혜 종목으로 ${ticker} 주목`,s:'pos',src:'연합뉴스',time:'5시간 전'},
    {t:`${ticker} 52주 신고가 도전 가능성`,s:'neu',src:'이데일리',time:'7시간 전'},
    {t:`단기 급등에 따른 차익실현 매물 주의`,s:'neg',src:'뉴스핌',time:'10시간 전'},
  ];
  document.getElementById('mNews').innerHTML=newsTemplates.map(n=>`
    <div class="news-item">
      <div class="ntitle">${n.t}</div>
      <div class="nmeta">
        <span>${n.src}</span><span>${n.time}</span>
        <span class="news-sentiment ${n.s}">${n.s==='pos'?'긍정':n.s==='neg'?'부정':'중립'}</span>
      </div>

  // 초기 탭
  switchModalTab('overview');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('aiContent').innerHTML='<div class="ai-loading"><div class="ai-spinner"></div>Grok AI 분석 중...</div>';
  fetchAI(type,{ticker,name,price,r,stock:isN?stock:stock,isN});
}

function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};
  ['priceChart','volumeChart','bbChart','macdChart'].forEach(id=>{
    const old=document.getElementById(id);
    if(!old) return;
    const neo=document.createElement('canvas');
    neo.id=id;
    neo.height=old.height;
    old.parentNode.replaceChild(neo,old);
  });
}

function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
  destroyCharts();
}

  const prompt=`당신은 전문 주식 애널리스트입니다. 아래 골든크로스 임박 종목 리스트에서 가장 투자 가치가 높은 TOP 3 종목을 선정해 주세요.

[나스닥 종목] ${nasdaqSummary}
[코스피 종목] ${kospiSummary}

반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트 없이 JSON만 출력하세요:
{
  "top3": [
    {
      "rank": 1,
      "ticker": "티커 또는 종목명",
      "market": "NASDAQ 또는 KOSPI",
      "score": 숫자(1-10),
      "opinion": "매수 또는 관망",
      "change": 등락률숫자,
      "price": "현재가 문자열",
      "reason": "선정 이유 3줄 (기술적 신호, 모멘텀, 투자 포인트 포함)",
      "strategy": "구체적 매매 전략 1줄",
      "risk": "주요 리스크 1줄"
    },
    { "rank": 2, ... },
    { "rank": 3, ... }
  ]
}`;

  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'';

    // JSON 파싱
    const jsonMatch=text.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('JSON 파싱 실패');
    const result=JSON.parse(jsonMatch[0]);
    renderTop3(result.top3);
  }catch(e){
    renderTop3Fallback();
  }
}

function renderTop3(items){
  const rankLabel=['🥇 1위','🥈 2위','🥉 3위'];
  const rankClass=['rank-1','rank-2','rank-3'];
  const el=document.getElementById('top3Content');
  el.innerHTML=`<div class="top3-grid">${items.map((d,i)=>`
    <div class="top3-card ${rankClass[i]}" onclick="openModalByName('${d.market}','${d.ticker}')">
      <div class="top3-rank ${rankClass[i]}">${rankLabel[i]} · ${d.market}</div>
      <div class="top3-ticker">${d.ticker}</div>
      <div class="top3-name">${d.market==='NASDAQ'?(nasdaqData.find(n=>n['티커']===d.ticker)||{})['기업명']||'':''}</div>
      <div class="top3-score">⭐ ${d.score}/10 · ${d.opinion}</div>
      <div class="top3-stats">
        <div class="top3-stat"><div class="tsl">현재가</div><div class="tsv">${d.price}</div></div>
        <div class="top3-stat"><div class="tsl">등락률</div><div class="tsv" style="color:var(--green)">+${d.change}%</div></div>
      </div>
      <div class="top3-reason">
        <div style="margin-bottom:6px">${d.reason}</div>
        <div style="color:var(--gold);font-size:11px">💡 ${d.strategy}</div>
        <div style="color:var(--muted);font-size:11px;margin-top:4px">⚠️ ${d.risk}</div>
      </div>
    </div>`).join('')}</div>`;
}

function renderTop3Fallback(){
  // API 실패 시 등락률 기준 자동 선정
  const allStocks=[
    ...nasdaqData.map(d=>({ticker:d['티커'],market:'NASDAQ',change:d['등락률(%)'],price:'$'+d['현재가($)'].toFixed(2),name:d['기업명']})),
    ...kospiData.map(d=>({ticker:d['종목명'],market:'KOSPI',change:d['등락률(%)'],price:d['현재가'].toLocaleString()+'원',name:''}))
  ].sort((a,b)=>b.change-a.change).slice(0,3);

  const items=allStocks.map((d,i)=>({
    rank:i+1, ticker:d.ticker, market:d.market,
    score:Math.min(10,Math.round(5+d.change*0.3)),
    opinion:d.change>=5?'매수':'관망',
    change:d.change, price:d.price,
    reason:`등락률 +${d.change}%로 골든크로스 임박 신호가 강하게 발현되고 있습니다. 단기 이동평균이 장기 이동평균을 상향 돌파하기 직전으로 매수 타이밍이 형성되고 있습니다. 거래량 증가와 함께 상승 모멘텀이 확인되고 있습니다.`,
    strategy:'현재가 기준 분할 매수 진입, 골든크로스 완성 시 추가 매수 검토',
    risk:'단기 급등 후 차익실현 매물 출현 가능성 주의'
  }));
  renderTop3(items);
}

function openModalByName(market, ticker){
  if(market==='NASDAQ'){
    const stock=nasdaqData.find(d=>d['티커']===ticker);
    if(stock) openModal('nasdaq',stock);
  } else {
    const stock=kospiData.find(d=>d['종목명']===ticker);
    if(stock) openModal('kospi',stock);
  }
}

현재 밸류에이션은 섹터 평균 대비 합리적 수준으로 판단됩니다.

골든크로스 완성 확인 후 잔여 비중(20%) 추가 매수로 평균 단가를 낮추세요.

function handleFiles(files){
  if(!files||!files.length) return;
  document.getElementById('loadedFiles').innerHTML='';
  document.getElementById('uploadTitle').textContent='파일 읽는 중...';

  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws);
        if(!rows.length){alert(file.name+': 데이터가 없습니다.');return;}

        const keys=Object.keys(rows[0]);
        const isNasdaq=keys.some(k=>k.includes('티커')||k.toLowerCase().includes('ticker'));

        if(isNasdaq){
          nasdaqData=rows.map(r=>({
            '티커': String(r['티커']||r['Ticker']||''),
            '기업명': String(r['기업명']||r['Company']||''),
            '현재가($)': parseFloat(r['현재가($)']||r['현재가']||0),
            '등락률(%)': parseFloat(r['등락률(%)']||r['등락률']||0),
          })).filter(r=>r['티커']&&r['현재가($)']>0);
          renderNasdaq();
        } else {
          kospiData=rows.map(r=>({
            '종목명': String(r['종목명']||r['종목']||''),
            '현재가': parseFloat(r['현재가']||0),
            '하단선': parseFloat(r['하단선']||0),
            '상한가(예상)': parseFloat(r['상한가(예상)']||r['상한가']||r['목표가']||0),
            '등락률(%)': parseFloat(r['등락률(%)']||r['등락률']||0),
            '호재 뉴스': String(r['호재 뉴스']||r['뉴스']||'없음'),
          })).filter(r=>r['종목명']&&r['현재가']>0);
          renderKospi();
        }

        const label=isNasdaq?'나스닥':'코스피';
        document.getElementById('loadedFiles').innerHTML+=
          `<div class="file-chip">✓ ${label} ${rows.length}종목</div>`;
        document.getElementById('uploadTitle').textContent='파일 로드 완료 — 아래에서 확인하세요';

        document.getElementById('top3Section').style.display='block';
        // 두 파일 모두 로드됐거나 파일이 1개면 바로 분석 실행
        runTop3Analysis();

      }catch(err){
        alert(file.name+' 읽기 실패: '+err.message);
        document.getElementById('uploadTitle').textContent='엑셀 파일을 드래그하거나 클릭해서 업로드';
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

const panel=document.getElementById('uploadPanel');
panel.addEventListener('dragover',e=>{e.preventDefault();panel.classList.add('drag');});
panel.addEventListener('dragleave',()=>panel.classList.remove('drag'));
panel.addEventListener('drop',e=>{
  e.preventDefault();
  panel.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});

renderNasdaq(); renderKospi();
</script>
